# =============================================================
#  MagicBridge nginx configuration
#  Drop into /etc/nginx/sites-available/magicbridge
#  symlink → /etc/nginx/sites-enabled/magicbridge
# =============================================================

# Redirect plain HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # TLS
    ssl_certificate     /etc/magicbridge/ssl/cert.pem;
    ssl_certificate_key /etc/magicbridge/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "same-origin"     always;
    add_header Permissions-Policy "pointer-lock=(self), camera=(), microphone=(), geolocation=()" always;

    # KVM web UI (proxied; magicbridge.py enforces login before serving it)
    location = / {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        add_header Cache-Control "no-store";
    }

    # Login page for the KVM UI
    location = /login {
        proxy_pass         http://127.0.0.1:8080/login;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    location = /logout {
        proxy_pass         http://127.0.0.1:8080/logout;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    location /static/ {
        alias /opt/magicbridge/web/static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # MJPEG stream from ustreamer / ffmpeg
    location /stream {
        proxy_pass         http://127.0.0.1:8081/stream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        # Allow large multipart frames
        client_max_body_size 0;
        # CORS for same-origin iframe use
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"  always;
    }

    # ustreamer snapshot endpoint
    location /snapshot {
        proxy_pass         http://127.0.0.1:8081/snapshot;
        proxy_buffering    off;
        add_header Cache-Control "no-store";
    }

    # MagicBridge KVM API + WebSocket
    location /ws {
        proxy_pass         http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Stealth admin panel
    # Access at: https://<host>/stealth/
    # Auth, USB identity, MAC, Tailscale, DuckDNS, WiFi, backup, logs
    location /stealth/ {
        proxy_pass         http://127.0.0.1:7777/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        # Strip /stealth prefix before forwarding
        # (Flask app is mounted at /, nginx strips /stealth)
    }

    # WiFi API, accessible from KVM page without stealth auth
    location /api/wifi/ {
        proxy_pass         http://127.0.0.1:7777/api/wifi/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 30s;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Logging
    access_log /var/log/nginx/magicbridge-access.log;
    error_log  /var/log/nginx/magicbridge-error.log;
}
