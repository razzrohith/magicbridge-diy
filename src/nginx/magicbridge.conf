# =============================================================
#  MagicBridge nginx configuration
#  Drop into /etc/nginx/sites-available/magicbridge
#  symlink → /etc/nginx/sites-enabled/magicbridge
# =============================================================

# Redirect plain HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # ANONYMITY (MAGICBRIDGE_SYSTEM.md §2): without this, nginx's http-level
    # default access_log (/var/log/nginx/access.log, on the SD card) records
    # every visitor's IP + User-Agent here. Since every first visit hits :80
    # before being redirected to :443, that persistently leaked client IPs to
    # disk. The :443 block logs to the RAM tmpfs; a bare redirect needs no log
    # at all, so turn it off entirely — nothing sensitive reaches the card.
    access_log off;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # TLS
    ssl_certificate     /etc/magicbridge/ssl/cert.pem;
    ssl_certificate_key /etc/magicbridge/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "same-origin"     always;
    add_header Permissions-Policy "pointer-lock=(self), camera=(), microphone=(), geolocation=()" always;

    # KVM web UI (proxied; magicbridge.py enforces login before serving it)
    location = / {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        add_header Cache-Control "no-store";
    }

    # Login page for the KVM UI
    location = /login {
        proxy_pass         http://127.0.0.1:8080/login;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    location = /logout {
        proxy_pass         http://127.0.0.1:8080/logout;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    location /static/ {
        alias /opt/magicbridge/web/static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # MJPEG stream from ustreamer / ffmpeg
    location /stream {
        proxy_pass         http://127.0.0.1:8081/stream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        # Allow large multipart frames
        client_max_body_size 0;
        # CORS for same-origin iframe use
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"  always;
    }

    # ustreamer snapshot endpoint
    location /snapshot {
        proxy_pass         http://127.0.0.1:8081/snapshot;
        proxy_buffering    off;
        add_header Cache-Control "no-store";
    }

    # Janus WebRTC Gateway - HTTP API (C790/H.264 video path, additive;
    # unused/harmless while mode stays "mjpeg"). Not actually wired up:
    # install_janus_webrtc.sh builds Janus with --disable-all-transports
    # --enable-websockets only (the frontend's Janus client only ever
    # talks to /janus-ws), so nothing listens on 8088 today. Left in
    # place in case the HTTP/REST transport is enabled later.
    location /janus-http/ {
        proxy_pass         http://127.0.0.1:8088/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 30s;
    }

    # Janus WebRTC Gateway - WebSocket API (C790/H.264 video path, actively used)
    location /janus-ws {
        proxy_pass         http://127.0.0.1:8188/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # MagicBridge KVM API + WebSocket
    location /ws {
        proxy_pass         http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Stealth admin panel
    # Access at: https://<host>/stealth/
    # Auth, USB identity, MAC, Tailscale, DuckDNS, WiFi, backup, logs
    location /stealth/ {
        proxy_pass         http://127.0.0.1:7777/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        # Strip /stealth prefix before forwarding
        # (Flask app is mounted at /, nginx strips /stealth)
    }

    # NOTE: there used to be a "location /api/wifi/" block here proxying
    # straight to the stealth Flask app on 7777 with no auth at all - a
    # leftover from before the main KVM page had its own /api/networks
    # endpoint. The main page has used /api/networks (authenticated via
    # magicbridge.py's auth_middleware, see location /api/ above) for a
    # while now, so that passthrough had no legitimate caller left and was
    # just an open door: anyone reaching this host over HTTPS could add/
    # remove/force-connect WiFi networks with zero credentials. Removed;
    # the stealth panel's own WiFi controls still work fine through
    # location /stealth/ since stealth-dashboard.py's /api/wifi/* routes
    # now check the panel's own session (and CSRF for POSTs) directly.

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Logging - tmpfs (RAM-only), wiped on reboot/power-loss. See
    # /var/log/magicbridge-ram tmpfs mount (fstab) and
    # /etc/logrotate.d/magicbridge-ram for growth bounding.
    access_log /var/log/magicbridge-ram/nginx-access.log;
    error_log  /var/log/magicbridge-ram/nginx-error.log;
}
